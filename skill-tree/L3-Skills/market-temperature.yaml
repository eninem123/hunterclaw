## 适用条件
判断是否应该建仓/加仓。

## 核心规则
| 温度 | 条件 | 操作 |
|------|------|------|
| 冰点（<30℃）| 缩量 | 观望，不建仓 |
| 暖意（≥50℃）| 放量≥5% | 回暖信号，可试探建仓 |
| 强势（≥80℃）| 明显放量 | 积极做多 |

## 量化标准
```
市场温度 = f(成交量增幅)
放量增幅 = (今日成交量 - 昨日成交量) / 昨日成交量

冰点: 成交量增幅 < -20%
缩量: -20% ~ -5%
持平: -5% ~ +5%
放量: +5% ~ +15%
爆量: > +15%
```

## 猎手系统实现
- 数据源: 腾讯行情指数（上证/深证/创业板）
- 计算方式: 涨幅均值映射温度
- 阈值: 温度≥50 + 放量≥5% → 可建仓

## 实战案例
### 2026-04-18 测试
- 测得温度: 65℃（放量+12.9%）
- 判断: 符合建仓条件
- 结果: 选到博纳影业（后因周六非交易日撤销）

## 关联技能
- volume-divergence（量价背离）
- trend-following（趋势跟踪）
