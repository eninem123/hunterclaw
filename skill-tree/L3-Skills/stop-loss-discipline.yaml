## 适用条件
任何持仓标的，触发即执行，无条件服从。

## 核心规则
- **绝对红线：-5% 必须走**
- 触发止损后，当日不得再次买入同一标的
- 止损后不得后悔/追回

## 量化标准
```
止损触发价 = 买入价 × 0.95
止损执行 = 当前价 ≤ 止损触发价
```

## 实战案例
### 002439 启明星辰
- 买入价: ¥15.00（追高）
- 止损价: ¥14.25
- 持仓理由: 短线反弹，3天内到16.50
- 教训: 成本偏高，止损空间仅3.3%

