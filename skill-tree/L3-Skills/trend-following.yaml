## 适用条件
选股时的趋势验证阶段。

## 核心规则
### 选股条件（东方财富初筛）
1. 主板股票（60/00/688开头），排除创业板（300/301）
2. 股价 10-100元
3. 今日涨幅 > 2%
4. 量比 > 1.5
5. 排除ST/N股

### K线趋势验证
1. 最近3天收盘价连续上涨（至少2天）
2. 成交量逐日放大（至少1天）
3. 综合评分 = 涨幅×2 + 量比×3

## 量化标准
```
趋势评分 = 涨幅得分 + 量比得分
涨幅得分 = 涨幅% × 2
量比得分 = 量比 × 3
最低入选分: 5分
最高入选分: 无上限，取TOP3
```

## K线判断逻辑
```
连续上涨天数 = sum(收盘价[i] > 收盘价[i-1] for i in 1..3)
成交量放大天数 = sum(成交量[i] > 成交量[i-1] for i in 1..3)
通过条件: 连续上涨≥2天 AND 放量≥1天
```

