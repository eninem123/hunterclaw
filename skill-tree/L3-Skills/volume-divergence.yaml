## 适用条件
持仓股和指数的日常监控，发现背离立即预警。

## 核心规则
### 三种背离类型

#### 1. 价涨量缩（最危险）
- 现象: 价格创新高，但成交量低于前期
- 含义: 主力未参与，上涨缺乏支撑
- 信号: 🔴 高危预警
- 操作: 警惕获利了结

```
触发条件: 今日收盘 > 昨日收盘 AND 今日成交量 < 昨日成交量×0.7
```

#### 2. 放量滞涨
- 现象: 成交量明显放大，但价格不涨
- 含义: 主力出货
- 信号: 🔴 高危预警
- 操作: 考虑减仓

```
触发条件: 成交量增幅 > 50% AND 价格涨幅 < 0.5%
```

#### 3. 连续缩量上涨
- 现象: 连续3天上涨，但成交量逐日萎缩
- 含义: 缺乏资金支撑，上涨不可持续
- 信号: 🟡 注意预警
- 操作: 注意获利了结

```
触发条件: 连续3天收盘价逐日上涨 AND 连续3天成交量逐日萎缩
```

## 量化标准
```
量比 = 当日成交量 / 5日均量
背离指标 = (价格变化% - 成交量变化%)
```

## 猎手系统实现
- 数据源: 腾讯分时K线（5日K线）
- 检测频率: 每日收盘前30分钟
- 预警输出: 微信通知 + 持仓报告

## 实战案例
### 002439 启明星辰（教训）
- 现象: 指数涨但持仓个股表现一般
- 原因: 缺乏量价配合
- 教训: 需要量价背离检测作为持仓监控标配

