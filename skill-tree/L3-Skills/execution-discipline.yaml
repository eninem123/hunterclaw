## 适用条件
收到买入信号后的所有执行场景。

## 核心规则
1. **信号有效期10分钟**：超时未回踩到建议价，信号自动失效
2. **不追高买入**：买入价必须 ≤ 信号价 + 1%
3. **等回踩**：信号发出后，5分钟内未回踩到建议价，放弃或降价
4. **立即执行**：确认买入后，5分钟内必须完成

## 量化标准
```
可接受买入价 = 信号建议价 × 1.01
追高判断 = 执行价 > 信号建议价 × 1.02
信号超时 = 信号发出后 > 10分钟未执行
```

## 实战案例
### 002439 启明星辰（反面）
- 信号发出: 14:37，建议价 ¥14.48-14.50
- 执行时间: 14:51（14分钟后，超时）
- 执行价: ¥15.00（追高3.45%）
- 教训: 信号有效期形同虚设，执行延迟14分钟

### 改进守则（已固化）
- 信号发出后，5分钟内未回踩 → 取消或降价
- 执行价超出建议价1%以上 → 放弃
- 超出10分钟 → 信号自动失效

## 关联技能
