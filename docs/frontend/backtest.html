<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>学区房回测系统</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0e17;color:#e0e6f0;font-family:-apple-system,sans-serif;padding:20px}.container{max-width:1200px;margin:0 auto}h1{font-size:24px;margin-bottom:20px;color:#00d4aa}.panel{background:#131a2a;border:1px solid #1e2a3a;border-radius:12px;padding:20px;margin-bottom:20px}.panel h2{font-size:16px;color:#7c8db5;margin-bottom:15px}.form-row{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:15px}.form-group{flex:1;min-width:200px}.form-group label{display:block;font-size:12px;color:#7c8db5;margin-bottom:5px}.form-group select,.form-group input{width:100%;padding:8px 12px;background:#0a0e17;border:1px solid #1e2a3a;border-radius:6px;color:#e0e6f0;font-size:14px}.btn{padding:10px 24px;background:linear-gradient(135deg,#00d4aa,#00a388);border:none;border-radius:6px;color:#0a0e17;font-weight:600;cursor:pointer;font-size:14px}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.metric{background:#0a0e17;border:1px solid #1e2a3a;border-radius:8px;padding:12px;text-align:center}.metric .value{font-size:28px;font-weight:700;color:#00d4aa}.metric .label{font-size:12px;color:#7c8db5;margin-top:4px}.negative .value{color:#ff4757}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:8px 12px;text-align:left;border-bottom:1px solid #1e2a3a}th{color:#7c8db5}.up{color:#00d4aa}.down{color:#ff4757}</style></head><body><div class="container"><h1>学区房回测系统</h1><div class="panel"><h2>回测参数</h2><div class="form-row"><div class="form-group"><label>楼盘</label><select id="estate"><option>绿景花园二期</option><option>花好园</option><option>园岭新村</option></select></div><div class="form-group"><label>买入年份</label><select id="buyYear"><option>2015</option><option>2016</option><option>2017</option><option>2018</option><option>2019</option><option>2020</option><option>2021</option><option>2022</option><option>2023</option><option>2024</option><option>2025</option></select></div><div class="form-group"><label>角色</label><select id="role"><option value="investor">投资</option><option value="owner_occupier">刚需</option></select></div></div><button class="btn" onclick="runBacktest()">运行回测</button></div><div class="panel" id="resultPanel" style="display:none"><h2>回测结果</h2><div class="result-grid" id="metrics"></div><div id="detailTable" style="overflow-x:auto;margin-top:15px"></div></div></div><script>const P={"绿景花园二期":{"2015":48000,"2016":52000,"2017":58000,"2018":62000,"2019":68000,"2020":74000,"2021":85000,"2022":78000,"2023":72000,"2024":68000,"2025":65000,"2026":63000},"花好园":{"2015":45000,"2016":49000,"2017":55000,"2018":59000,"2019":65000,"2020":71000,"2021":80000,"2022":74000,"2023":68000,"2024":64000,"2025":61000,"2026":59000},"园岭新村":{"2015":55000,"2016":62000,"2017":70000,"2018":78000,"2019":88000,"2020":98000,"2021":115000,"2022":105000,"2023":95000,"2024":90000,"2025":86000,"2026":83000}};const A={"绿景花园二期":70.14,"花好园":68,"园岭新村":75};const R={"绿景花园二期":{"2015":4500,"2016":4800,"2017":5000,"2018":5200,"2019":5500,"2020":5800,"2021":6200,"2022":6500,"2023":7000,"2024":7200,"2025":7300,"2026":7300},"花好园":{"2015":4200,"2016":4500,"2017":4700,"2018":4900,"2019":5200,"2020":5400,"2021":5800,"2022":6100,"2023":6600,"2024":6800,"2025":6900,"2026":6900},"园岭新村":{"2015":4800,"2016":5100,"2017":5400,"2018":5600,"2019":6000,"2020":6300,"2021":6800,"2022":7200,"2023":7800,"2024":8000,"2025":8100,"2026":8100}};function runBacktest(){const e=document.getElementById("estate").value,b=+document.getElementById("buyYear").value,ro=document.getElementById("role").value;const s=2026,a=A[e],bP=P[e][b],sP=P[e][s],bT=bP*a,sT=sP*a,cG=sT-bT,cGR=((sT/bT-1)*100).toFixed(1),yrs=s-b,aR=((Math.pow(sT/bT,1/yrs)-1)*100).toFixed(1);let tR=0;for(let y=b;y<=s;y++)tR+=R[e][y]*12;const rY=((tR/bT)*100).toFixed(1),tG=cG+tR;document.getElementById("resultPanel").style.display="";document.getElementById("metrics").innerHTML=`<div class="metric"><div class="value">${(bT/1e4).toFixed(1)}万</div><div class="label">买入总价</div></div><div class="metric"><div class="value">${(sT/1e4).toFixed(1)}万</div><div class="label">卖出总价</div></div><div class="metric ${cG<0?"negative":""}"><div class="value">${cG>=0?"+":""}${(cG/1e4).toFixed(1)}万</div><div class="label">资本利得</div></div><div class="metric ${cG<0?"negative":""}"><div class="value">${cGR}%</div><div class="label">房价涨幅</div></div><div class="metric"><div class="value">${aR}%</div><div class="label">年化回报</div></div><div class="metric"><div class="value">${(tR/1e4).toFixed(1)}万</div><div class="label">累计租金</div></div><div class="metric"><div class="value">${rY}%</div><div class="label">租金回报率</div></div><div class="metric ${tG<0?"negative":""}"><div class="value">${tG>=0?"+":""}${(tG/1e4).toFixed(1)}万</div><div class="label">总收益</div></div>`;let rows="";for(let y=b;y<=s;y++){const p=P[e][y],r=R[e][y],ch=y>b?((p/P[e][y-1]-1)*100).toFixed(1):"-";rows+=`<tr><td>${y}</td><td>${p.toLocaleString()}</td><td class="${ch==="-"?"":+ch>=0?"up":"down"}">${ch==="-"?"-":ch+"%"}</td><td>${r.toLocaleString()}</td><td>${(r*12/1e4).toFixed(1)}万</td></tr>`}document.getElementById("detailTable").innerHTML=`<table><tr><th>年份</th><th>单价</th><th>涨跌</th><th>月租</th><th>年租金</th></tr>${rows}</table>`}</script></body></html>
